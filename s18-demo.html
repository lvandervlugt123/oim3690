<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Sum of X and Y</title>
	<style>
		body {
			font-family: Arial, sans-serif;
			max-width: 420px;
			margin: 40px auto;
			padding: 0 16px;
			line-height: 1.5;
		}

		label,
		input,
		button,
		p {
			display: block;
			width: 100%;
			margin-bottom: 12px;
		}

		input,
		button {
			padding: 8px;
			font-size: 1rem;
		}

		button {
			cursor: pointer;
		}
	</style>
</head>
<body>
	<h1>Add Two Numbers</h1>

	<label for="x">Enter x:</label>
	<input type="number" id="x" placeholder="Number for x" />

	<label for="y">Enter y:</label>
	<input type="number" id="y" placeholder="Number for y" />

	<button id="addBtn">Show Sum</button>

	<p id="result">Result: </p>

	<h2>Put First and Last Name Together</h2>

	<label for="firstName">Enter first name:</label>
	<input type="text" id="firstName" placeholder="First name" />

	<label for="lastName">Enter last name:</label>
	<input type="text" id="lastName" placeholder="Last name" />

	<button id="nameBtn">Show Full Name</button>

	<p id="nameResult">Full Name: </p>

	<script>
		const xInput = document.getElementById('x');
		const yInput = document.getElementById('y');
		const addBtn = document.getElementById('addBtn');
		const result = document.getElementById('result');
		const firstNameInput = document.getElementById('firstName');
		const lastNameInput = document.getElementById('lastName');
		const nameBtn = document.getElementById('nameBtn');
		const nameResult = document.getElementById('nameResult');

		function add(a, b) {
			return a + b;
		}

		addBtn.addEventListener('click', () => {
			const sum = add(parseFloat(xInput.value), parseFloat(yInput.value));
			result.textContent = `Result: ${sum}`;
		});

		nameBtn.addEventListener('click', () => {
			const fullName = add(firstNameInput.value, ` ${lastNameInput.value}`);
			nameResult.textContent = `Full Name: ${fullName}`;
		});
	</script>
</body>
</html>
