<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Random Word</title>
</head>
<body>
	<button id="getWordBtn">Get Random Word</button>
	<p id="wordOutput"></p>

	<script>
		async function getRandomWord() {
			const output = document.getElementById('wordOutput');
			output.textContent = 'loading...';

			try {
				const response = await fetch('https://oim.108122.xyz/words/random');

				if (!response.ok) {
					throw new Error(`HTTP ${response.status}`);
				}

				const word = await response.json();
				output.textContent = word;
			} catch (error) {
				output.textContent = `Error: ${error.message}`;
			}
		}

		document.getElementById('getWordBtn').addEventListener('click', getRandomWord);
	</script>
</body>
</html>
