<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
      body {
        font-family: Arial, Helvetica, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background-color: #dbeafe;
        transition: background-color 0.4s ease;
      }

      .card {
        background: rgba(255, 255, 255, 0.9);
        padding: 2rem;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        width: min(90vw, 420px);
      }

      h1 {
        margin-top: 0;
      }

      .controls {
        display: grid;
        gap: 0.75rem;
      }

      input,
      select,
      button {
        font-size: 1rem;
        padding: 0.7rem 0.85rem;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
      }

      button {
        border: none;
        background: #2563eb;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      p {
        margin-top: 1rem;
        min-height: 1.5rem;
        font-size: 1.15rem;
        font-weight: 600;
        opacity: 0;
      }

      .show {
        animation: popIn 500ms ease forwards;
      }

      @keyframes popIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
    </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World</h1>
    <div class="controls">
      <input id="name" type="text" placeholder="Enter your name">
      <select id="language">
        <option value="english">English</option>
        <option value="spanish">Spanish</option>
        <option value="chinese">Chinese</option>
      </select>
      <button>Greet</button>
    </div>
    <p></p>
  </div>
    <script>
      const nameInput = document.querySelector("#name");
      const languageSelect = document.querySelector("#language");
      const greetButton = document.querySelector("button");
      const greetingText = document.querySelector("p");
      const pageBody = document.querySelector("body");

      function getGreeting(language, name) {
        if (language === "spanish") return `¡Hola, ${name}!`;
        if (language === "chinese") return `你好，${name}！`;
        return `Hello, ${name}!`;
      }

      function setBackground(language) {
        if (language === "spanish") pageBody.style.backgroundColor = "#fee2e2";
        else if (language === "chinese") pageBody.style.backgroundColor = "#fef3c7";
        else pageBody.style.backgroundColor = "#dbeafe";
      }

      greetButton.addEventListener("click", function () {
        const name = nameInput.value.trim() || "friend";
        const language = languageSelect.value;

        greetingText.classList.remove("show");
        greetingText.textContent = getGreeting(language, name);
        setBackground(language);

        requestAnimationFrame(function () {
          greetingText.classList.add("show");
        });
      });
    </script>
</body>
</html>
