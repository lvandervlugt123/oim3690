<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />        
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Town - OIM3690</title>
</head>
<body>
    <h1>Random Massachusetts Town</h1>
    <p id="town">Loading…</p>
    <button onclick="fetchTown()">New Town</button>
    <p id="author"></p>
    <p id="error"></p>

    <script>
        async function fetchTown() {
            const townEl = document.getElementById('town');
            const errorEl = document.getElementById('error');

            townEl.textContent = 'Loading…';
            errorEl.textContent = '';

            const response = await fetch('https://oim.108122.xyz/mass');
            if (!response.ok) {
                townEl.textContent = '—';
                errorEl.textContent = `Error fetching town: HTTP ${response.status}`;
                return;
            }

            const massData = await response.json();
            const towns = [];

            for (let i = 0; i < massData.data.length; i++) {
                if (massData.data[i].type === 'town') {
                    towns.push(massData.data[i]);
                }
            }

            if (towns.length === 0) {
                townEl.textContent = '—';
                errorEl.textContent = 'No towns found in dataset.';
                return;
            }

            const randomTown = towns[Math.floor(Math.random() * towns.length)];
            townEl.textContent = randomTown.name;
        }

        async function postMessage(text) {
            const authorEl = document.getElementById('author');
            const response = await fetch('https://oim.108122.xyz/message', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Token': 'lucianlucian'
                },
                body: JSON.stringify({ message: text })
            });
            const result = await response.json();
            authorEl.textContent = `Posted by: ${result.author}`;
            console.log(result);
        }

        async function findTown() {
            const search = document.querySelector('#search').value.toLowerCase();
            const response = await fetch('https://oim.108122.xyz/mass');
            const data = await response.json();

            const matches = [];
            for (const town of data.data) {
                if (town.name.toLowerCase().includes(search)) {
                    matches.push(town);
                }
            }

            displayResults(matches);
        }

        // Fetch a town on page load
        fetchTown();
        postMessage('Hello from Lucian!');
    </script>
</body>
</html>
