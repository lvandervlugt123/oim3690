<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Canvas Playground</title>
	<link rel="stylesheet" href="css/styles.css" />
	<style>
		:root {
			--video-url: "https://www.youtube.com/watch?v=eHaZlFcGl6k";
		}

		body.playground {
			max-width: 920px;
			margin: 0 auto;
			padding: 20px;
			position: relative;
			min-height: 100vh;
		}

		.video-bg {
			position: fixed;
			top: 0;
			left: 0;
			width: 100vw;
			height: 100vh;
			overflow: hidden;
			z-index: -2;
			pointer-events: none;
		}

		.video-bg iframe {
			position: absolute;
			top: 50%;
			left: 50%;
			width: 177.78vh;
			height: 56.25vw;
			min-width: 100vw;
			min-height: 100vh;
			transform: translate(-50%, -50%);
			border: 0;
		}

		.video-overlay {
			position: fixed;
			inset: 0;
			background: rgba(10, 14, 24, 0.48);
			z-index: -1;
		}

		header,
		main {
			position: relative;
			z-index: 1;
		}

		header {
			border-radius: 12px;
			backdrop-filter: blur(2px);
		}

		.toolbar {
			display: flex;
			flex-wrap: wrap;
			align-items: center;
			gap: 12px;
			padding: 12px;
			background: var(--surface);
			border-radius: 12px;
			box-shadow: 0 6px 18px rgba(30, 41, 59, 0.06);
			margin-bottom: 14px;
		}

		.video-link {
			margin-left: auto;
			font-weight: 600;
		}

		.video-link a {
			color: var(--text);
			background: rgba(255, 255, 255, 0.85);
			padding: 6px 10px;
			border-radius: 8px;
			text-decoration: none;
		}

		.video-link a:hover {
			text-decoration: underline;
		}

		.toolbar label {
			display: flex;
			align-items: center;
			gap: 8px;
			font-weight: 600;
		}

		#canvas {
			width: 100%;
			height: 500px;
			border: 2px solid #e9e6f5;
			border-radius: 12px;
			background: #fff;
			touch-action: none;
			display: block;
			box-shadow: 0 8px 20px rgba(30, 41, 59, 0.08);
		}
	</style>
</head>
<body class="playground">
	<div class="video-bg" aria-hidden="true">
		<iframe
			src="https://www.youtube.com/embed/eHaZlFcGl6k?autoplay=1&mute=1&controls=0&loop=1&playlist=eHaZlFcGl6k&playsinline=1"
			title="Background video"
			allow="autoplay; encrypted-media; picture-in-picture"
			referrerpolicy="strict-origin-when-cross-origin"
		></iframe>
	</div>
	<div class="video-overlay" aria-hidden="true"></div>

	<header>
		<h1>Canvas Playground</h1>
		<p>Draw with your mouse or finger over a YouTube video background.</p>
	</header>

	<main>
		<div class="toolbar" aria-label="Drawing controls">
			<label for="colorPicker">Color
				<input id="colorPicker" type="color" value="#334155" />
			</label>

			<label for="brushSize">Brush
				<input id="brushSize" type="range" min="1" max="40" value="6" />
			</label>

			<button id="clearButton" type="button">Clear</button>

			<p class="video-link">
				<a href="https://www.youtube.com/watch?v=eHaZlFcGl6k" target="_blank" rel="noopener noreferrer">Open video on YouTube</a>
			</p>
		</div>

		<canvas id="canvas" aria-label="Drawing canvas"></canvas>
	</main>

	<script>
		const canvas = document.getElementById('canvas');
		const ctx = canvas.getContext('2d');
		const colorPicker = document.getElementById('colorPicker');
		const brushSize = document.getElementById('brushSize');
		const clearButton = document.getElementById('clearButton');

		let isDrawing = false;
		let lastX = 0;
		let lastY = 0;

		function resizeCanvas() {
			const drawing = ctx.getImageData(0, 0, canvas.width, canvas.height);
			canvas.width = canvas.clientWidth;
			canvas.height = canvas.clientHeight;
			ctx.fillStyle = '#ffffff';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
			ctx.putImageData(drawing, 0, 0);
			ctx.lineCap = 'round';
			ctx.lineJoin = 'round';
		}

		function getPoint(event) {
			const rect = canvas.getBoundingClientRect();
			return {
				x: event.clientX - rect.left,
				y: event.clientY - rect.top
			};
		}

		function startDraw(event) {
			isDrawing = true;
			const point = getPoint(event);
			lastX = point.x;
			lastY = point.y;
		}

		function draw(event) {
			if (!isDrawing) return;
			const point = getPoint(event);

			ctx.strokeStyle = colorPicker.value;
			ctx.lineWidth = Number(brushSize.value);
			ctx.beginPath();
			ctx.moveTo(lastX, lastY);
			ctx.lineTo(point.x, point.y);
			ctx.stroke();

			lastX = point.x;
			lastY = point.y;
		}

		function stopDraw() {
			isDrawing = false;
		}

		clearButton.addEventListener('click', () => {
			ctx.fillStyle = '#ffffff';
			ctx.fillRect(0, 0, canvas.width, canvas.height);
		});

		canvas.addEventListener('pointerdown', startDraw);
		canvas.addEventListener('pointermove', draw);
		canvas.addEventListener('pointerup', stopDraw);
		canvas.addEventListener('pointerleave', stopDraw);

		canvas.width = canvas.clientWidth;
		canvas.height = canvas.clientHeight;
		ctx.fillStyle = '#ffffff';
		ctx.fillRect(0, 0, canvas.width, canvas.height);
		ctx.lineCap = 'round';
		ctx.lineJoin = 'round';

		window.addEventListener('resize', resizeCanvas);
	</script>
</body>
</html>
