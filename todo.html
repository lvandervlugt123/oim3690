<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Simple Todo App</title>
	<style>
		:root {
			--bg1: #0f1029;
			--bg2: #1a0f3d;
			--bg3: #072f4b;
			--card: #ffffff14;
			--muted: #c7d2fe;
			--text: #f8fafc;
			--accent: #34d399;
			--accent-2: #22d3ee;
			--danger: #fb7185;
			--border: #ffffff2b;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
			background: radial-gradient(circle at 10% 10%, #8b5cf655, transparent 35%),
				linear-gradient(130deg, var(--bg1), var(--bg2) 45%, var(--bg3));
			color: var(--text);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.app {
			width: 100%;
			max-width: 620px;
			background: linear-gradient(180deg, #ffffff1c, #ffffff10);
			backdrop-filter: blur(8px);
			border: 1px solid var(--border);
			border-radius: 18px;
			padding: 20px;
			box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
		}

		h1 {
			margin: 0 0 14px;
			font-size: 1.65rem;
			letter-spacing: 0.3px;
			background: linear-gradient(90deg, #f9a8d4, #93c5fd 35%, #67e8f9 70%, #86efac);
			-webkit-background-clip: text;
			background-clip: text;
			color: transparent;
		}

		form {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 10px;
			margin-bottom: 14px;
		}

		input[type="text"] {
			width: 100%;
			border: 1px solid var(--border);
			background: #02061766;
			color: var(--text);
			border-radius: 10px;
			padding: 10px 12px;
			font-size: 1rem;
		}

		input[type="text"]::placeholder {
			color: #dbeafea8;
		}

		button {
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 10px 14px;
			color: var(--text);
			background: #0f172a80;
			cursor: pointer;
			transition: transform 140ms ease, filter 140ms ease, background-color 140ms ease;
		}

		button:hover {
			filter: brightness(1.08);
			transform: translateY(-1px);
		}

		.primary {
			background: linear-gradient(90deg, #10b981, #06b6d4);
			border-color: #67e8f9aa;
			color: #042f2e;
			font-weight: 700;
		}

		.controls {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 14px;
			flex-wrap: wrap;
		}

		.filters {
			display: flex;
			gap: 8px;
		}

		.filters button.active {
			background: linear-gradient(90deg, #818cf8, #22d3ee);
			border-color: #a5b4fc;
			color: #111827;
			font-weight: 700;
		}

		ul {
			list-style: none;
			margin: 0;
			padding: 0;
			border-top: 1px solid var(--border);
		}

		li {
			position: relative;
			overflow: hidden;
			display: grid;
			grid-template-columns: auto 1fr auto;
			align-items: center;
			gap: 10px;
			padding: 10px 0;
			border-bottom: 1px solid var(--border);
		}

		li input[type="checkbox"] {
			accent-color: #14b8a6;
			width: 18px;
			height: 18px;
		}

		.todo-text {
			overflow-wrap: anywhere;
			transition: transform 180ms ease;
		}

		.done .todo-text {
			color: var(--muted);
			text-decoration: line-through;
		}

		.celebrate {
			animation: pulse-done 550ms ease;
		}

		.celebrate::after {
			content: "✨ 🎉 ✨";
			position: absolute;
			right: 64px;
			top: 50%;
			transform: translateY(-50%) scale(0.5);
			opacity: 0;
			pointer-events: none;
			animation: spark-pop 750ms ease-out;
		}

		@keyframes pulse-done {
			0% {
				transform: scale(1);
				background: transparent;
			}
			35% {
				transform: scale(1.02);
				background: #34d3992a;
			}
			100% {
				transform: scale(1);
				background: transparent;
			}
		}

		@keyframes spark-pop {
			0% {
				opacity: 0;
				transform: translateY(-50%) scale(0.5) rotate(-10deg);
			}
			30% {
				opacity: 1;
				transform: translateY(-90%) scale(1.05) rotate(6deg);
			}
			100% {
				opacity: 0;
				transform: translateY(-150%) scale(1.1) rotate(12deg);
			}
		}

		.danger {
			background: #88133766;
			border-color: #fda4af88;
			color: #ffe4e6;
		}

		.empty {
			color: var(--muted);
			text-align: center;
			padding: 14px 0 4px;
		}

		small {
			color: var(--muted);
		}
	</style>
</head>
<body>
	<main class="app">
		<h1>Todo App</h1>

		<form id="todo-form">
			<input id="todo-input" type="text" placeholder="What do you need to do?" autocomplete="off" />
			<button class="primary" type="submit">Add</button>
		</form>

		<div class="controls">
			<small id="items-left">0 items left</small>
			<div class="filters" id="filters">
				<button type="button" data-filter="all" class="active">All</button>
				<button type="button" data-filter="active">Active</button>
				<button type="button" data-filter="done">Done</button>
			</div>
			<button id="clear-done" type="button" class="danger">Clear done</button>
		</div>

		<ul id="todo-list"></ul>
		<p id="empty-state" class="empty">No tasks yet.</p>
	</main>

	<script>
		const STORAGE_KEY = "vanilla-todo-items";

		const form = document.getElementById("todo-form");
		const input = document.getElementById("todo-input");
		const list = document.getElementById("todo-list");
		const itemsLeft = document.getElementById("items-left");
		const filters = document.getElementById("filters");
		const clearDoneButton = document.getElementById("clear-done");
		const emptyState = document.getElementById("empty-state");

		let todos = loadTodos();
		let currentFilter = "all";
		let celebratedTodoId = null;

		function loadTodos() {
			try {
				const saved = localStorage.getItem(STORAGE_KEY);
				return saved ? JSON.parse(saved) : [];
			} catch {
				return [];
			}
		}

		function saveTodos() {
			localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
		}

		function addTodo(text) {
			todos.unshift({
				id: crypto.randomUUID(),
				text,
				done: false
			});
			saveTodos();
			render();
		}

		function toggleTodo(id) {
			todos = todos.map((todo) => {
				if (todo.id !== id) return todo;
				const nowDone = !todo.done;
				if (nowDone) celebratedTodoId = id;
				return { ...todo, done: nowDone };
			});
			saveTodos();
			render();
		}

		function deleteTodo(id) {
			todos = todos.filter((todo) => todo.id !== id);
			saveTodos();
			render();
		}

		function clearDone() {
			todos = todos.filter((todo) => !todo.done);
			saveTodos();
			render();
		}

		function getVisibleTodos() {
			if (currentFilter === "active") {
				return todos.filter((todo) => !todo.done);
			}
			if (currentFilter === "done") {
				return todos.filter((todo) => todo.done);
			}
			return todos;
		}

		function updateFooter() {
			const activeCount = todos.filter((todo) => !todo.done).length;
			itemsLeft.textContent = `${activeCount} item${activeCount === 1 ? "" : "s"} left`;
			emptyState.style.display = getVisibleTodos().length === 0 ? "block" : "none";
		}

		function render() {
			list.innerHTML = "";
			const visibleTodos = getVisibleTodos();

			for (const todo of visibleTodos) {
				const li = document.createElement("li");
				if (todo.done) li.classList.add("done");
				if (todo.id === celebratedTodoId) li.classList.add("celebrate");

				const checkbox = document.createElement("input");
				checkbox.type = "checkbox";
				checkbox.checked = todo.done;
				checkbox.setAttribute("aria-label", `Mark \"${todo.text}\" as done`);
				checkbox.addEventListener("change", () => toggleTodo(todo.id));

				const span = document.createElement("span");
				span.className = "todo-text";
				span.textContent = todo.text;

				const removeButton = document.createElement("button");
				removeButton.className = "danger";
				removeButton.type = "button";
				removeButton.textContent = "Delete";
				removeButton.addEventListener("click", () => deleteTodo(todo.id));

				li.append(checkbox, span, removeButton);
				list.appendChild(li);
			}

			if (celebratedTodoId) {
				setTimeout(() => {
					celebratedTodoId = null;
				}, 800);
			}

			updateFooter();
		}

		form.addEventListener("submit", (event) => {
			event.preventDefault();
			const text = input.value.trim();
			if (!text) return;

			addTodo(text);
			input.value = "";
			input.focus();
		});

		filters.addEventListener("click", (event) => {
			const button = event.target.closest("button[data-filter]");
			if (!button) return;

			currentFilter = button.dataset.filter;
			for (const btn of filters.querySelectorAll("button")) {
				btn.classList.toggle("active", btn === button);
			}
			render();
		});

		clearDoneButton.addEventListener("click", clearDone);

		render();
	</script>
</body>
</html>
