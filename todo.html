<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Simple Todo App</title>
	<style>
		:root {
			--bg: #0f172a;
			--card: #111827;
			--muted: #94a3b8;
			--text: #e2e8f0;
			--accent: #22c55e;
			--danger: #ef4444;
			--border: #1f2937;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
			background: linear-gradient(180deg, #0b1022, var(--bg));
			color: var(--text);
			display: grid;
			place-items: center;
			padding: 24px;
		}

		.app {
			width: 100%;
			max-width: 620px;
			background: color-mix(in oklab, var(--card) 88%, black);
			border: 1px solid var(--border);
			border-radius: 14px;
			padding: 20px;
			box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
		}

		h1 {
			margin: 0 0 14px;
			font-size: 1.5rem;
		}

		form {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 10px;
			margin-bottom: 14px;
		}

		input[type="text"] {
			width: 100%;
			border: 1px solid var(--border);
			background: #0b1220;
			color: var(--text);
			border-radius: 10px;
			padding: 10px 12px;
			font-size: 1rem;
		}

		button {
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 10px 14px;
			color: var(--text);
			background: #172033;
			cursor: pointer;
		}

		button:hover {
			filter: brightness(1.08);
		}

		.primary {
			background: #153523;
			border-color: #1b4f32;
		}

		.controls {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 12px;
			margin-bottom: 14px;
			flex-wrap: wrap;
		}

		.filters {
			display: flex;
			gap: 8px;
		}

		.filters button.active {
			background: #1f2b45;
			border-color: #334155;
		}

		ul {
			list-style: none;
			margin: 0;
			padding: 0;
			border-top: 1px solid var(--border);
		}

		li {
			display: grid;
			grid-template-columns: auto 1fr auto;
			align-items: center;
			gap: 10px;
			padding: 10px 0;
			border-bottom: 1px solid var(--border);
		}

		.todo-text {
			overflow-wrap: anywhere;
		}

		.done .todo-text {
			color: var(--muted);
			text-decoration: line-through;
		}

		.danger {
			background: #32181b;
			border-color: #4b1d22;
			color: #fecaca;
		}

		.empty {
			color: var(--muted);
			text-align: center;
			padding: 14px 0 4px;
		}

		small {
			color: var(--muted);
		}
	</style>
</head>
<body>
	<main class="app">
		<h1>Todo App</h1>

		<form id="todo-form">
			<input id="todo-input" type="text" placeholder="What do you need to do?" autocomplete="off" />
			<button class="primary" type="submit">Add</button>
		</form>

		<div class="controls">
			<small id="items-left">0 items left</small>
			<div class="filters" id="filters">
				<button type="button" data-filter="all" class="active">All</button>
				<button type="button" data-filter="active">Active</button>
				<button type="button" data-filter="done">Done</button>
			</div>
			<button id="clear-done" type="button" class="danger">Clear done</button>
		</div>

		<ul id="todo-list"></ul>
		<p id="empty-state" class="empty">No tasks yet.</p>
	</main>

	<script>
		const STORAGE_KEY = "vanilla-todo-items";

		const form = document.getElementById("todo-form");
		const input = document.getElementById("todo-input");
		const list = document.getElementById("todo-list");
		const itemsLeft = document.getElementById("items-left");
		const filters = document.getElementById("filters");
		const clearDoneButton = document.getElementById("clear-done");
		const emptyState = document.getElementById("empty-state");

		let todos = loadTodos();
		let currentFilter = "all";

		function loadTodos() {
			try {
				const saved = localStorage.getItem(STORAGE_KEY);
				return saved ? JSON.parse(saved) : [];
			} catch {
				return [];
			}
		}

		function saveTodos() {
			localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
		}

		function addTodo(text) {
			todos.unshift({
				id: crypto.randomUUID(),
				text,
				done: false
			});
			saveTodos();
			render();
		}

		function toggleTodo(id) {
			todos = todos.map((todo) =>
				todo.id === id ? { ...todo, done: !todo.done } : todo
			);
			saveTodos();
			render();
		}

		function deleteTodo(id) {
			todos = todos.filter((todo) => todo.id !== id);
			saveTodos();
			render();
		}

		function clearDone() {
			todos = todos.filter((todo) => !todo.done);
			saveTodos();
			render();
		}

		function getVisibleTodos() {
			if (currentFilter === "active") {
				return todos.filter((todo) => !todo.done);
			}
			if (currentFilter === "done") {
				return todos.filter((todo) => todo.done);
			}
			return todos;
		}

		function updateFooter() {
			const activeCount = todos.filter((todo) => !todo.done).length;
			itemsLeft.textContent = `${activeCount} item${activeCount === 1 ? "" : "s"} left`;
			emptyState.style.display = getVisibleTodos().length === 0 ? "block" : "none";
		}

		function render() {
			list.innerHTML = "";
			const visibleTodos = getVisibleTodos();

			for (const todo of visibleTodos) {
				const li = document.createElement("li");
				if (todo.done) li.classList.add("done");

				const checkbox = document.createElement("input");
				checkbox.type = "checkbox";
				checkbox.checked = todo.done;
				checkbox.setAttribute("aria-label", `Mark \"${todo.text}\" as done`);
				checkbox.addEventListener("change", () => toggleTodo(todo.id));

				const span = document.createElement("span");
				span.className = "todo-text";
				span.textContent = todo.text;

				const removeButton = document.createElement("button");
				removeButton.className = "danger";
				removeButton.type = "button";
				removeButton.textContent = "Delete";
				removeButton.addEventListener("click", () => deleteTodo(todo.id));

				li.append(checkbox, span, removeButton);
				list.appendChild(li);
			}

			updateFooter();
		}

		form.addEventListener("submit", (event) => {
			event.preventDefault();
			const text = input.value.trim();
			if (!text) return;

			addTodo(text);
			input.value = "";
			input.focus();
		});

		filters.addEventListener("click", (event) => {
			const button = event.target.closest("button[data-filter]");
			if (!button) return;

			currentFilter = button.dataset.filter;
			for (const btn of filters.querySelectorAll("button")) {
				btn.classList.toggle("active", btn === button);
			}
			render();
		});

		clearDoneButton.addEventListener("click", clearDone);

		render();
	</script>
</body>
</html>
