	<!DOCTYPE html>
	<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Town Explorer</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				max-width: 760px;
				margin: 2rem auto;
				padding: 0 1rem;
				line-height: 1.5;
			}

			h1 {
				margin-bottom: 0.5rem;
			}

			.search-row {
				margin: 1rem 0;
			}

			input[type="text"] {
				width: 100%;
				max-width: 420px;
				padding: 0.6rem 0.8rem;
				border: 1px solid #ccc;
				border-radius: 6px;
				font-size: 1rem;
			}

			#matchCount {
				margin: 0.6rem 0 1rem;
				color: #444;
			}

			ul {
				padding-left: 1.2rem;
			}

			li {
				margin-bottom: 0.4rem;
			}

			#error {
				color: #c62828;
			}
		</style>
	</head>
	<body>
		<h1>Massachusetts Town Explorer</h1>
		<p>Showing towns from the API.</p>

		<div class="search-row">
			<label for="searchInput">Search by town name:</label><br />
			<input id="searchInput" type="text" placeholder="Type a town name..." />
		</div>

		<p id="matchCount">Loading towns...</p>
		<ul id="townList"></ul>
		<p id="error"></p>

		<script>
			const townListEl = document.getElementById('townList');
			const matchCountEl = document.getElementById('matchCount');
			const errorEl = document.getElementById('error');
			const searchInputEl = document.getElementById('searchInput');

			let towns = [];

			function renderTowns() {
				const query = searchInputEl.value.trim().toLowerCase();
				const filtered = towns.filter((town) =>
					town.name.toLowerCase().includes(query)
				);

				const firstTen = filtered.slice(0, 10);
				townListEl.innerHTML = '';

				if (firstTen.length === 0) {
					townListEl.innerHTML = '<li>No matching towns found.</li>';
				} else {
					firstTen.forEach((town) => {
						const li = document.createElement('li');
						li.textContent = `${town.name} — ${town.county} County — Population: ${town.population.toLocaleString()}`;
						townListEl.appendChild(li);
					});
				}

				matchCountEl.textContent = `${filtered.length} town(s) matched.`;
			}

			async function loadTowns() {
				try {
					const response = await fetch('https://oim.108122.xyz/mass');
					if (!response.ok) {
						throw new Error(`HTTP ${response.status}`);
					}

					const massData = await response.json();
					towns = massData.data.filter((place) => place.type === 'town');

					renderTowns();
				} catch (error) {
					matchCountEl.textContent = '0 town(s) matched.';
					errorEl.textContent = `Could not load towns: ${error.message}`;
				}
			}

			searchInputEl.addEventListener('input', renderTowns);
			loadTowns();
		</script>
	</body>
	</html>
