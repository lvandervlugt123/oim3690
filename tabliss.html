<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tabliss — New Tab</title>
    <link rel="stylesheet" href="css/tabliss.css">
</head>
<body>
    <div class="container">
        <div class="time-display" id="time">00:00:00</div>
        <div class="date-display" id="date"></div>
        <div class="greeting" id="greeting"></div>

        <div class="quick-links">
            <a href="about-me.html" class="link-card">
                <span>👤</span>
                <p>About</p>
            </a>
            <a href="interests.html" class="link-card">
                <span>✨</span>
                <p>Interests</p>
            </a>
            <a href="index.html" class="link-card">
                <span>🏠</span>
                <p>Home</p>
            </a>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
        }

        function updateDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateStr = now.toLocaleDateString('en-US', options);
            document.getElementById('date').textContent = dateStr;
        }

        function updateGreeting() {
            const now = new Date();
            const hour = now.getHours();
            let greeting = '';

            if (hour < 12) {
                greeting = '☀️ Good morning';
            } else if (hour < 18) {
                greeting = '🌤️ Good afternoon';
            } else {
                greeting = '🌙 Good evening';
            }

            document.getElementById('greeting').textContent = greeting;
        }

        // Initial updates
        updateTime();
        updateDate();
        updateGreeting();

        // Update time every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
